<h2>Agregar Libro</h2>
<form (ngSubmit)="addLibro()">
  <div class="form-group">
    <label for="titulo">Título</label>
    <input type="text" id="titulo" [(ngModel)]="libro.titulo" name="titulo" required />
  </div>
  <div class="form-group">
    <label for="autor">Autor</label>
    <input type="text" id="autor" [(ngModel)]="libro.autor" name="autor" required />
  </div>
  <div class="form-group">
    <label for="isbn">ISBN</label>
    <input type="text" id="isbn" [(ngModel)]="libro.isbn" name="isbn" required />
  </div>
  <div class="form-group">
    <label for="categoria">Categoría</label>
    <input type="text" id="categoria" [(ngModel)]="libro.categoria" name="categoria" required />
  </div>
  <div class="form-group">
    <label for="cantidadDisponible">Cantidad Disponible</label>
    <input type="number" id="cantidadDisponible" [(ngModel)]="libro.cantidadDisponible" name="cantidadDisponible" required min="1" />
  </div>
  <div class="form-group">
    <label for="fecha_publicacion">Fecha de Publicación</label>
    <input type="date" id="fecha_publicacion" [(ngModel)]="libro.fecha_publicacion" name="fecha_publicacion" required />
  </div>
  <button type="submit" class="btn-submit">Agregar Libro</button>
</form>
